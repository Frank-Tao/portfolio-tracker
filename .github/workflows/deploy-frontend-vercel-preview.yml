name: Deploy Frontend Preview to Vercel

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "packages/client/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/deploy-frontend-vercel-preview.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy:
    # GitHub does not expose repository secrets to forked pull requests.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PORTFOLIO_API_ORIGIN: ${{ vars.PORTFOLIO_API_ORIGIN }}
          PORTFOLIO_API_ORIGIN_PREVIEW: ${{ vars.PORTFOLIO_API_ORIGIN_PREVIEW }}
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing GitHub secret: VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing GitHub secret: VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing GitHub secret: VERCEL_PROJECT_ID" && exit 1)
          API_ORIGIN="${PORTFOLIO_API_ORIGIN_PREVIEW:-$PORTFOLIO_API_ORIGIN}"
          test -n "$API_ORIGIN" || (echo "Set either PORTFOLIO_API_ORIGIN_PREVIEW or PORTFOLIO_API_ORIGIN in GitHub variables" && exit 1)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Render Vercel config
        env:
          PORTFOLIO_API_ORIGIN: ${{ vars.PORTFOLIO_API_ORIGIN }}
          PORTFOLIO_API_ORIGIN_PREVIEW: ${{ vars.PORTFOLIO_API_ORIGIN_PREVIEW }}
        run: |
          API_ORIGIN="${PORTFOLIO_API_ORIGIN_PREVIEW:-$PORTFOLIO_API_ORIGIN}"
          API_ORIGIN="${API_ORIGIN%/}"
          test -n "$API_ORIGIN" || (echo "API origin resolves to empty value" && exit 1)
          sed "s|__PORTFOLIO_API_ORIGIN__|$API_ORIGIN|g" packages/client/vercel.json.template > packages/client/vercel.json

      - name: Deploy preview with Vercel
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          DEPLOY_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          test -n "$DEPLOY_URL" || (echo "Vercel deploy did not return URL" && exit 1)
          echo "preview_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- vercel-preview-comment -->';
            const body = `${marker}
            ✅ Vercel preview deployed

            ${process.env.PREVIEW_URL}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
