name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "packages/client/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/deploy-frontend-vercel.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PORTFOLIO_API_ORIGIN: ${{ vars.PORTFOLIO_API_ORIGIN }}
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing GitHub secret: VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing GitHub secret: VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing GitHub secret: VERCEL_PROJECT_ID" && exit 1)
          test -n "$PORTFOLIO_API_ORIGIN" || (echo "Missing GitHub variable: PORTFOLIO_API_ORIGIN" && exit 1)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Render Vercel config
        env:
          PORTFOLIO_API_ORIGIN: ${{ vars.PORTFOLIO_API_ORIGIN }}
        run: |
          API_ORIGIN="${PORTFOLIO_API_ORIGIN%/}"
          test -n "$API_ORIGIN" || (echo "PORTFOLIO_API_ORIGIN resolves to empty value" && exit 1)
          sed "s|__PORTFOLIO_API_ORIGIN__|$API_ORIGIN|g" packages/client/vercel.json.template > packages/client/vercel.json
          cat packages/client/vercel.json

      - name: Deploy with Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
